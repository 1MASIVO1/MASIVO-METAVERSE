<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASIVO NFT</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
color:white;
background:black;
overflow-x:hidden;
}

/* VIDEO FONDO */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.45);
}

/* TITULO */

h1{
margin-top:40px;
font-size:40px;
letter-spacing:3px;
}

/* GALERIA */

.gallery{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
flex-wrap:wrap;
padding-bottom:100px;
}

/* TARJETA NFT */

.card{
width:320px;
background:rgba(0,0,0,0.75);
padding:15px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

.card img{
width:100%;
border-radius:12px;
}

/* ACCIONES */

.actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
font-size:14px;
}

button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:14px;
}

/* COMENTARIOS */

.comments{
margin-top:15px;
text-align:left;
font-size:13px;
max-height:120px;
overflow-y:auto;
}

.comment-input{
display:flex;
gap:5px;
margin-top:10px;
}

.comment-input input{
flex:1;
padding:6px;
border-radius:6px;
border:none;
}

.send{
background:#00ffaa;
color:black;
padding:5px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<!-- VIDEO FONDO -->

<video autoplay muted loop playsinline>
<source src="images/background.mp4" type="video/mp4">
</video>

<h1>MASIVO NFT</h1>

<div class="gallery">

<!-- NFT 1 -->

<div class="card" data-id="nft1">

<img src="images/nft1.png">

<div class="actions">

<button class="like">👍 <span>0</span></button>

<div>👁️ <span class="views">0</span></div>

<button class="download">⬇️ <span>0</span></button>

<button class="share">🔁</button>

</div>

<div class="comments"></div>

<div class="comment-input">

<input type="text" placeholder="Tu nombre" class="username">

<input type="text" placeholder="Comentario..." class="content">

<button class="send">Enviar</button>

</div>

</div>

</div>

<script>

/* SUPABASE */

const supabase = window.supabase.createClient(
"https://rnkuxwsuztewgbdmjyxt.supabase.co",
"sb_publishable_TV8SzvPyTPZauyBNkg_RxA_oW5N56NT"
);

/* CARGAR STATS */

async function loadStats(card){

const id = card.dataset.id;

const { data } = await supabase
.from('nft_stats')
.select('*')
.eq('id', id)
.single();

if(!data) return;

card.querySelector('.like span').textContent = data.likes;
card.querySelector('.views').textContent = data.views;
card.querySelector('.download span').textContent = data.downloads;

/* SUMAR VIEW */

await supabase
.from('nft_stats')
.update({ views: data.views + 1 })
.eq('id', id);

}

/* CARGAR COMENTARIOS */

async function loadComments(card){

const id = card.dataset.id;

const { data } = await supabase
.from('comments')
.select('*')
.eq('nft_id', id)
.order('created_at', { ascending:false });

const container = card.querySelector('.comments');

container.innerHTML = '';

if(!data) return;

data.forEach(c => {

container.innerHTML +=
`<div><b>${c.username}</b>: ${c.content}</div>`;

});

}

/* EVENTOS */

document.querySelectorAll('.card').forEach(card => {

loadStats(card);
loadComments(card);

/* LIKE */

card.querySelector('.like').addEventListener('click', async ()=>{

const id = card.dataset.id;

const span = card.querySelector('.like span');

let current = parseInt(span.textContent);

span.textContent = current + 1;

await supabase
.from('nft_stats')
.update({ likes: current + 1 })
.eq('id', id);

});

/* DOWNLOAD */

card.querySelector('.download').addEventListener('click', async ()=>{

const id = card.dataset.id;

const span = card.querySelector('.download span');

let current = parseInt(span.textContent);

span.textContent = current + 1;

await supabase
.from('nft_stats')
.update({ downloads: current + 1 })
.eq('id', id);

window.open(card.querySelector('img').src);

});

/* SHARE */

card.querySelector('.share').addEventListener('click', async ()=>{

const url = window.location.href + "#" + card.dataset.id;

if(navigator.share){

navigator.share({
title:"MASIVO NFT",
text:"Mira este NFT",
url:url
});

}else{

navigator.clipboard.writeText(url);

alert("Link copiado 🔥");

}

});

/* COMENTARIO */

card.querySelector('.send').addEventListener('click', async ()=>{

const id = card.dataset.id;

const username = card.querySelector('.username').value;

const content = card.querySelector('.content').value;

if(!username || !content) return;

await supabase
.from('comments')
.insert([{ nft_id:id, username, content }]);

card.querySelector('.content').value = '';

loadComments(card);

});

});

</script>

</body>
</html>
