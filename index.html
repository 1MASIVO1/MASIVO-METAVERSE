<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MASIVO METAVERSE</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

h1{
text-align:center;
font-size:50px;
margin-top:40px;
}

#nft-gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.nft{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

.nft img{
width:100%;
border-radius:10px;
}

.share-buttons button{
margin:5px;
padding:5px 10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>MASIVO METAVERSE</h1>

<div id="nft-gallery"></div>

<script>

const gallery=document.getElementById("nft-gallery")

for(let i=1;i<=1000;i++){

const nft=document.createElement("div")
nft.className="nft"

const img=document.createElement("img")

img.src="https://raw.githubusercontent.com/1MASIVO1/MASIVO-METAVERSE/main/images/"+i+".png"

img.onerror=function(){
nft.remove()
}

const share=document.createElement("div")
share.className="share-buttons"

share.innerHTML=`
<button onclick="shareFacebook(${i})">Facebook</button>
<button onclick="shareX(${i})">X</button>
<button onclick="shareReddit(${i})">Reddit</button>
<button onclick="shareTelegram(${i})">Telegram</button>
<button onclick="shareWhatsApp(${i})">WhatsApp</button>
<button onclick="shareLinkedIn(${i})">LinkedIn</button>
<button onclick="sharePinterest(${i})">Pinterest</button>
<button onclick="shareTumblr(${i})">Tumblr</button>
`

nft.appendChild(img)
nft.appendChild(share)

gallery.appendChild(nft)

}

function shareFacebook(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://www.facebook.com/sharer/sharer.php?u="+url
)

}

function shareX(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://twitter.com/intent/tweet?url="+url
)

}

function shareReddit(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://www.reddit.com/submit?url="+url
)

}

function shareTelegram(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://t.me/share/url?url="+url
)

}

function shareWhatsApp(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://api.whatsapp.com/send?text="+url
)

}

function shareLinkedIn(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://www.linkedin.com/sharing/share-offsite/?url="+url
)

}

function sharePinterest(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://pinterest.com/pin/create/button/?url="+url
)

}

function shareTumblr(id){

const url="https://tusitio.com/nft/"+id

window.open(
"https://www.tumblr.com/widgets/share/tool?canonicalUrl="+url
)

}

</script>

</body>

</html>
