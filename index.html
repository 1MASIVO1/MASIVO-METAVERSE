<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MASIVO METAVERSE</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow-x:hidden;
}

#background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

h1{
text-align:center;
font-size:50px;
margin-top:40px;
}

#nft-gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.nft img{
width:100%;
border-radius:10px;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0px)}
}

#rankings{
padding:40px;
}

.ranking-box{
background:#111;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

</style>

</head>

<body>

<canvas id="background"></canvas>

<h1>MASIVO METAVERSE</h1>

<div id="nft-gallery"></div>

<section id="rankings">

<div class="ranking-box">
<h2>TOP LIKES</h2>
<div id="ranking-likes"></div>
</div>

<div class="ranking-box">
<h2>TOP VISTAS</h2>
<div id="ranking-views"></div>
</div>

<div class="ranking-box">
<h2>TOP COMPARTIDOS</h2>
<div id="ranking-shares"></div>
</div>

<div class="ranking-box">
<h2>TOP DESCARGAS</h2>
<div id="ranking-downloads"></div>
</div>

</section>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js"

const supabase = createClient(
"TU_SUPABASE_URL",
"TU_SUPABASE_ANON_KEY"
)

async function cargarRanking(){

const likes = await supabase
.from("nft_stats")
.select("*")
.order("likes",{ascending:false})
.limit(10)

const views = await supabase
.from("nft_stats")
.select("*")
.order("views",{ascending:false})
.limit(10)

const shares = await supabase
.from("nft_stats")
.select("*")
.order("shares",{ascending:false})
.limit(10)

const downloads = await supabase
.from("nft_stats")
.select("*")
.order("downloads",{ascending:false})
.limit(10)

mostrarRanking(likes.data,"ranking-likes","❤️")
mostrarRanking(views.data,"ranking-views","👁️")
mostrarRanking(shares.data,"ranking-shares","🔗")
mostrarRanking(downloads.data,"ranking-downloads","⬇️")

}

function mostrarRanking(data,contenedor,icono){

const div=document.getElementById(contenedor)

div.innerHTML=""

data.forEach(nft=>{

const item=document.createElement("div")

item.innerHTML="NFT "+nft.id+" "+icono+" "+(nft.likes || nft.views || nft.shares || nft.downloads)

div.appendChild(item)

})

}

cargarRanking()

const gallery=document.getElementById("nft-gallery")

for(let i=1;i<=1000;i++){

const nft=document.createElement("div")
nft.className="nft"

const img=document.createElement("img")

img.src="https://raw.githubusercontent.com/1MASIVO1/MASIVO-METAVERSE/main/images/"+i+".png"

img.onerror=function(){
nft.remove()
}

nft.appendChild(img)

gallery.appendChild(nft)

}

</script>

</body>

</html>
