<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MASIVO NFT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<video id="videoFondo" autoplay muted loop>
<source src="fondo.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<canvas id="fireworks"></canvas>

<h1 class="titulo">MASIVO NFT METAVERSE</h1>

<div class="grid">

<div class="nft">
<img src="nft1.png" onclick="verNFT(this)">

<div class="stats">
<span class="likes">❤️ 0</span>
<span class="views">👁 0</span>
<span class="downloads">⬇ 0</span>
<span class="shares">🔗 0</span>
</div>

<div class="logros">🏆 <span class="logroNum">0</span></div>

<div class="botones">
<button onclick="like(this)">Like</button>
<button onclick="share(this)">Compartir</button>
<button onclick="download(this)">Descargar</button>
</div>

</div>

</div>

<div class="modal" id="modal">
<img id="imgModal">
</div>

<script src="script.js"></script>
<script src="fireworks.js"></script>

</body>
</html>
