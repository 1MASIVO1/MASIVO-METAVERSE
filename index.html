<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>MASIVO METAVERSE</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

h1{
text-align:center;
font-size:50px;
margin-top:40px;
}

#nft-gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.nft{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

.nft img{
width:100%;
border-radius:10px;
}

#chat-container{
position:fixed;
bottom:0;
right:0;
width:320px;
height:420px;
background:#111;
border-left:2px solid #333;
border-top:2px solid #333;
display:flex;
flex-direction:column;
}

#chat-messages{
flex:1;
overflow-y:auto;
padding:10px;
font-size:14px;
}

#chat-input-area{
display:flex;
}

#chat-input{
flex:1;
padding:10px;
border:none;
outline:none;
}

#send-btn{
background:#444;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

.message{
margin-bottom:8px;
}

.username{
color:#00ffff;
font-weight:bold;
}

</style>

</head>

<body>

<h1>MASIVO METAVERSE</h1>

<div id="nft-gallery"></div>

<div id="chat-container">

<div id="chat-messages"></div>

<div id="chat-input-area">
<input id="chat-input" placeholder="Escribe mensaje...">
<button id="send-btn">Enviar</button>
</div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js"

const supabase = createClient(
"TU_SUPABASE_URL",
"TU_SUPABASE_ANON_KEY"
)

const gallery=document.getElementById("nft-gallery")

for(let i=1;i<=1000;i++){

const nft=document.createElement("div")
nft.className="nft"

const img=document.createElement("img")

img.src="https://raw.githubusercontent.com/1MASIVO1/MASIVO-METAVERSE/main/images/"+i+".png"

img.onerror=function(){
nft.remove()
}

nft.appendChild(img)

gallery.appendChild(nft)

}

const messagesDiv=document.getElementById("chat-messages")

async function loadMessages(){

const { data } = await supabase
.from("global_chat")
.select("*")
.order("created_at",{ascending:true})
.limit(100)

messagesDiv.innerHTML=""

data.forEach(msg=>{
addMessage(msg)
})

}

function addMessage(msg){

const div=document.createElement("div")
div.className="message"

div.innerHTML="<span class='username'>"+(msg.username||"anon")+":</span> "+msg.message

messagesDiv.appendChild(div)

messagesDiv.scrollTop=messagesDiv.scrollHeight

}

loadMessages()

document.getElementById("send-btn").onclick=async()=>{

const text=document.getElementById("chat-input").value

if(text==="")return

await supabase.from("global_chat").insert([
{username:"user",message:text}
])

document.getElementById("chat-input").value=""

}

supabase
.channel("chat-room")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"global_chat"
},
payload=>{
addMessage(payload.new)
}
)
.subscribe()

</script>

</body>

</html>
