<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASIVO METAVERSE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<video autoplay muted loop id="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<h1 class="title">
MASIVO METAVERSE
</h1>

<canvas id="fireworks"></canvas>

<div class="nft-container" id="nft-container"></div>

<div id="nftModal" class="modal">

<span class="close">&times;</span>

<img class="modal-content" id="modalImg">

<div class="buttons">

<button id="likeBtn">LIKE ❤️</button>
<button id="downloadBtn">DOWNLOAD ⬇</button>
<button id="shareBtn">SHARE 🔗</button>

</div>

<div class="stats">

<span id="views">👁 0</span>
<span id="likes">❤️ 0</span>
<span id="downloads">⬇ 0</span>
<span id="shares">🔗 0</span>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
