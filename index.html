<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASIVO METAVERSE</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<h1 class="title">MASIVO METAVERSE</h1>

<div class="gallery">

<div class="nft-card" data-id="nft1">
<img src="nft1.png" class="nft">
<div class="stats">
❤️ <span class="likes">0</span>
👁 <span class="views">0</span>
⬇ <span class="downloads">0</span>
🔗 <span class="shares">0</span>
</div>

<div class="buttons">
<button class="like">LIKE</button>
<button class="download">DOWNLOAD</button>
<button class="share">SHARE</button>
</div>
</div>

<div class="nft-card" data-id="nft2">
<img src="nft2.png" class="nft">
<div class="stats">
❤️ <span class="likes">0</span>
👁 <span class="views">0</span>
⬇ <span class="downloads">0</span>
🔗 <span class="shares">0</span>
</div>

<div class="buttons">
<button class="like">LIKE</button>
<button class="download">DOWNLOAD</button>
<button class="share">SHARE</button>
</div>
</div>

</div>

<div id="zoomViewer">
<img id="zoomImg">
</div>

<h2>🌍 Chat Mundial</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Escribe mensaje...">
<button id="sendChat">Enviar</button>

<script src="script.js"></script>

</body>
</html>
