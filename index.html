<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASIVO METAVERSE</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="background"></div>

<h1 class="logo">
MASIVO METAVERSE
<div class="fireworks"></div>
</h1>

<div id="ranking">

<h2>TOP MASIVO</h2>

<div id="topLikes"></div>

</div>

<div id="gallery" class="gallery"></div>

<div id="viewer">

<img id="viewer-img">

<div id="viewer-actions">

<button id="likeBtn">👍 <span id="likeCount">0</span></button>

<button id="downloadBtn">⬇ <span id="downloadCount">0</span></button>

<button id="shareBtn">🔗 <span id="shareCount">0</span></button>

<div>👁 <span id="viewCount">0</span></div>

</div>

</div>

<div id="shareMenu">

<button data-social="facebook">Facebook</button>
<button data-social="tiktok">TikTok</button>
<button data-social="x">X</button>
<button data-social="instagram">Instagram</button>
<button data-social="reddit">Reddit</button>
<button data-social="telegram">Telegram</button>
<button data-social="youtube">YouTube</button>
<button data-social="twitch">Twitch</button>
<button data-social="kick">Kick</button>
<button data-social="discord">Discord</button>

</div>

<script src="script.js"></script>

</body>

</html>
