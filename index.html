<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>MASIVO METAVERSE</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<canvas id="metaverse"></canvas>

<canvas id="fireworks"></canvas>

<h1 id="tituloLogo" class="titulo">MASIVO METAVERSE</h1>

<div class="rankingPanel">

<h2>🏆 NFT Ranking</h2>

<div id="rankingLikes"></div>

<div id="rankingViews"></div>

</div>

<div class="grid">

<div class="nft" data-id="1">

<img src="images/nft1.png" onclick="abrirNFT(this)">

<div class="logros"></div>

<div class="stats">

<span class="likes">❤️ 0</span>

<span class="views">👁 0</span>

<span class="downloads">⬇ 0</span>

<span class="shares">🔗 0</span>

</div>

<div class="botones">

<button onclick="like(this)">❤️</button>

<button onclick="vista(this)">👁</button>

<button onclick="descargar(this)">⬇</button>

<button onclick="share(this)">🔗</button>

</div>

</div>

</div>

<div id="chat">

<h2>🌎 Chat Mundial</h2>

<div id="mensajes"></div>

<input id="chatInput" placeholder="Escribe un mensaje...">

<button onclick="enviarMensaje()">Enviar</button>

</div>

<script src="metaverse.js"></script>

<script src="fireworks.js"></script>

<script src="script.js"></script>

<script src="ranking.js"></script>

<script src="chat.js"></script>

</body>

</html>
