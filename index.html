<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
width:100%;
height:100%;
font-family:Arial;
color:white;
background:black;
overflow-x:hidden;
}

/* VIDEO FONDO */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-1;
}

/* TITULO */

h1{
position:absolute;
top:40px;
left:40px;
font-size:40px;
letter-spacing:3px;
}

/* GALERIA */

.gallery{
position:relative;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* CARD NFT */

.card{
width:280px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:15px;
backdrop-filter:blur(6px);
}

.card img{
width:100%;
border-radius:10px;
}

/* BOTONES */

.actions{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

button{
background:none;
border:none;
color:white;
cursor:pointer;
}

.comments{
margin-top:10px;
font-size:13px;
max-height:120px;
overflow-y:auto;
}

.comment-input{
display:flex;
gap:5px;
margin-top:10px;
}

.comment-input input{
flex:1;
padding:6px;
border-radius:6px;
border:none;
}

</style>
