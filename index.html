<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MASIVO METAVERSE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<video autoplay muted loop id="bgVideo">
<source src="images/background.mp4" type="video/mp4">
</video>

<h1 class="title">MASIVO METAVERSE</h1>

<div class="nft-container" id="gallery"></div>

<div id="viewer" class="viewer hidden">
<img id="viewerImg">
<div class="viewerButtons">

<button id="likeBtn">❤️ <span id="likeCount">0</span></button>

<button id="shareBtn">🔗 <span id="shareCount">0</span></button>

<button id="downloadBtn">⬇ <span id="downloadCount">0</span></button>

<div class="views">👁 <span id="viewCount">0</span></div>

</div>

<button id="closeViewer">X</button>

</div>

<script src="script.js"></script>

</body>
</html>
