<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASIVO NFT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* VIDEO FONDO */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-1;
}

/* EFECTO LADOS */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
90deg,
rgba(0,0,0,0.85) 0%,
transparent 25%,
transparent 75%,
rgba(0,0,0,0.85) 100%
);
pointer-events:none;
}

/* TITULO */

h1{
position:absolute;
top:40px;
left:40px;
font-size:42px;
letter-spacing:3px;
}

/* GALERIA */

#gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
padding-top:140px;
padding-bottom:120px;
}

/* TARJETA NFT */

.card{
width:260px;
background:rgba(0,0,0,0.65);
border-radius:16px;
padding:12px;
backdrop-filter:blur(8px);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

/* ACCIONES */

.actions{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

button{
background:none;
border:none;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- VIDEO FONDO -->

<video autoplay muted loop playsinline>
<source src="images/background.mp4" type="video/mp4">
</video>

<h1>MASIVO NFT</h1>

<div id="gallery"></div>

<script>

/* CUANTOS NFT BUSCAR */

const MAX_NFT = 100

const gallery = document.getElementById("gallery")

for(let i=1;i<=MAX_NFT;i++){

let img = new Image()

img.src = "images/nft"+i+".png"

img.onload = () => {

let views = Math.floor(Math.random()*300)

let card = document.createElement("div")

card.className="card"

card.innerHTML = `

<img src="images/nft${i}.png">

<div class="actions">

<button onclick="like(this)">
❤️ <span>0</span>
</button>

<span>👁 ${views}</span>

<button onclick="downloadNFT(${i})">
⬇️
</button>

<button onclick="share()">
🔗
</button>

</div>

`

gallery.appendChild(card)

}

}

/* LIKE */

function like(btn){

let span = btn.querySelector("span")

span.innerText = parseInt(span.innerText)+1

}

/* SHARE */

function share(){

navigator.clipboard.writeText(window.location.href)

alert("Link copiado")

}

/* DESCARGAR NFT */

function downloadNFT(id){

const link = document.createElement("a")

link.href = "images/nft"+id+".png"

link.download = "MASIVO-NFT-"+id+".png"

link.click()

}

</script>

</body>
</html>
